services:
  exchange:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOPROXY: "https://goproxy.cn,direct"
    container_name: atlasx-exchange
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      HTTP_ADDR: ":8080"
      POSTGRES_DSN: "postgres://atlasx:atlasx@postgres:5432/atlasx?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      REDPANDA_BROKERS: "redpanda:9092"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    container_name: atlasx-postgres
    environment:
      POSTGRES_USER: atlasx
      POSTGRES_PASSWORD: atlasx
      POSTGRES_DB: atlasx
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlasx -d atlasx"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: atlasx-redis
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - redis_data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.10
    container_name: atlasx-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "512M"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --set
      - "redpanda.auto_create_topics_enabled=true"
      - --kafka-addr
      - "PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092"
      - --advertise-kafka-addr
      - "PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092"
      - --pandaproxy-addr
      - "0.0.0.0:8082"
      - --advertise-pandaproxy-addr
      - "redpanda:8082"
    ports:
      - "19092:19092"
      - "18082:8082"
    volumes:
      - redpanda_data:/var/lib/redpanda/data

volumes:
  postgres_data:
  redis_data:
  redpanda_data:
